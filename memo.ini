★コーディング仕様の確認

コンテンツ幅
全体の最大幅は1000pxで、コンテンツ部分の最大幅は800pxです。
フォント
Google Fonts の「Raleway」を使用します。
数量とサイズの表について
tableタグを使用してコーディングしてみましょう。
レスポンシブ
ブレークポイントは896pxです。
スマホ時は、グローバルナビゲーションを横スクロールできるようにします。




★デザインの確認



◎デモサイトからの情報(ＨＴＭＬ)


・レイアウト構成を確認

→レイアウトやページの構成はどうなっているか


-全体のレイアウト構成を確認
header、main、aside、section、foote　ファビコンなど、サイトの主要なブロックの単位

-各パーツのレイアウト構成を確認
全体のレイアウト構成を、もう少し細かく分割



・動きの確認
→スクロールやマウスオーバー、クリック時の動きはどうなっているか

・レスポンシブの確認
→画面サイズがかわったとき、デザインはどのように変化するのか



◎Figmaからの情報(ＣＳＳ)
①：font-family（フォントの種類）を取得
②：font-size（フォントのサイズ）を取得
③：font-weight（フォントの太さ）を取得
④：color（フォントの色）を取得
⑤：line-height（行間）を取得
⑥：letter-spacing（文字間）を取得
⑦：width（横幅）を取得
⑧：height（高さ）を取得
⑨：border（線）を取得
⑩：border-radius（角丸）を取得
⑪：background-color（背景色）を取得
⑫：opacity（透明度）を取得
⑬：box-shadow（影）を取得
⑭：余白を取得
⑮：画像の書き出し

